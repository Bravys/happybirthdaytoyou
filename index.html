<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>

  <!-- Favicon (logo in tab) -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(to bottom, #ffe0f0, #fff);
      font-family: 'Comic Sans MS', cursive;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    #startMessage {
      font-size: 22px;
      color: #ff3399;
      cursor: pointer;
    }
    .card {
      display: none; /* hidden at start */
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 102, 204, 0.3);
      max-width: 400px;
    }
    img {
      max-width: 90%;
      border: 5px solid #ff66cc;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 102, 204, 0.5);
    }
    .bottom-section {
      margin-top: 15px;
    }
    h1 {
      color: #ff3399;
      margin: 10px 0;
    }
    p {
      font-size: 18px;
      color: #333;
      margin: 5px 0 15px;
    }
  </style>
</head>
<body>
  <!-- Initial message -->
  <div id="startMessage">✨ Click anywhere to open your card ✨</div>

  <!-- Hidden card -->
  <div class="card" id="birthdayCard">
    <img src="birthday_card.png" alt="Birthday Card">

    <div class="bottom-section">
      <h1>🎉 Happy Birthday! 🎂</h1>
      <p>Wishing you joy, laughter, and lots of cake!</p>
    </div>
  </div>

  <!-- Background music -->
  <audio id="birthdaySong" loop>
    <source src="happybirthday.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    // When user clicks anywhere, show card + start music
    document.body.addEventListener("click", function() {
      document.getElementById("startMessage").style.display = "none";
      document.getElementById("birthdayCard").style.display = "inline-block";
      document.getElementById("birthdaySong").play();
    }, { once: true }); // only first click triggers
  </script>
</body>
</html>
