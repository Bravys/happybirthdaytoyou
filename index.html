<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>

  <!-- Favicon (logo in tab) -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body {
      text-align: center;
      background: linear-gradient(to bottom, #ffe0f0, #fff);
      font-family: 'Comic Sans MS', cursive;
      margin: 0;
      padding: 0;
    }
    .card {
      margin-top: 50px;
      padding: 20px;
      display: inline-block;
    }
    img {
      max-width: 90%;
      border: 5px solid #ff66cc;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 102, 204, 0.5);
    }
    .bottom-section {
      margin-top: 20px;
    }
    h1 {
      color: #ff3399;
      margin: 10px 0;
    }
    p {
      font-size: 20px;
      color: #333;
      margin: 5px 0 15px;
    }
    button {
      padding: 12px 25px;
      font-size: 18px;
      background-color: #ff66cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    button:hover {
      background-color: #ff3399;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Your birthday card image -->
    <img src="birthday_card.png" alt="Birthday Card">

    <!-- Bottom section with text + button -->
    <div class="bottom-section">
      <h1>🎉 Happy Birthday! 🎂</h1>
      <p>Wishing you joy, laughter, and lots of cake!</p>
      <button id="playBtn" onclick="document.getElementById('birthdaySong').play()">
        🎵 Play Happy Birthday Song
      </button>
    </div>
  </div>

  <!-- Background music -->
  <audio id="birthdaySong" loop>
    <source src="happybirthday.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <!-- Auto press button after 1 second -->
  <script>
    window.onload = function() {
      setTimeout(function() {
        document.getElementById("playBtn").click();
      }, 1000); // 1000 ms = 1 second
    };
  </script>
</body>
</html>
