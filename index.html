<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <style>
    body {
      text-align: center;
      background: linear-gradient(to bottom, #ffe0f0, #fff);
      font-family: 'Comic Sans MS', cursive;
      margin: 0;
      padding: 0;
    }
    .card {
      margin-top: 50px;
      padding: 20px;
      display: inline-block;
    }
    img {
      max-width: 90%;
      border: 5px solid #ff66cc;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 102, 204, 0.5);
    }
    h1 {
      color: #ff3399;
      margin-top: 20px;
    }
    p {
      font-size: 20px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Your birthday card image -->
    <img src="birthday_card.png" alt="Birthday Card">
    <h1>🎉 Happy Birthday! 🎂</h1>
    <p>Wishing you joy, laughter, and lots of cake!</p>
  </div>

  <!-- Background music -->
  <audio autoplay loop>
    <source src="happybirthday.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</body>
</html>
